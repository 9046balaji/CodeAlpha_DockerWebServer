name: Docker Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (advanced build capabilities)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t nginx-portfolio:ci-${{ github.sha }} .
          echo "Image built successfully!"

      # Step 4: Run container and test it
      - name: Start container and run health test
        run: |
          docker run -d --name test-container -p 8080:80 nginx-portfolio:ci-${{ github.sha }}
          echo "Waiting for container to start..."
          sleep 5
          docker ps

      # Step 5: Verify the web server responds
      - name: Verify web server is responding
        run: |
          curl --fail --silent --show-error http://localhost:8080
          echo "Web server is responding successfully!"

      # Step 6: Check container health status
      - name: Check container health
        run: |
          STATUS=$(docker inspect --format='{{.State.Status}}' test-container)
          echo "Container status: $STATUS"

      # Step 7: Show container logs
      - name: Show container logs
        run: docker logs test-container

      # Step 8: Cleanup
      - name: Stop and remove test container
        run: |
          docker stop test-container
          docker rm test-container

      # Step 9: List images
      - name: List Docker images
        run: docker images
